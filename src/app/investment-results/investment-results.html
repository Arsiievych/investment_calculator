<section class="results-card">
    <h2>Investment Results</h2>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Year</th>
                <th class="num">Invested Capital</th>
                <th class="num">Investment Value</th>
                <th class="num">Interest (Year)</th>
                <th class="num">Total Interest</th>
            </tr>
            </thead>
            <tbody>
                @for (row of investmentResults; track row.year) {
                    <tr>
                        <td>{{ row.year }}</td>
                        <td class="num">{{ row.investedCapital | currency }}</td>
                        <td class="num">{{ row.investmentValue | currency }}</td>
                        <td class="num">{{ row.interestYear | currency }}</td>
                        <td class="num">{{ row.totalInterest| currency }}</td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</section>
